<!-- Record Work Page -->
<h2>📝 Record Work</h2>

<!-- Work Type Selection -->
<div class="card">
    <h3>💡 Select Work Type</h3>
    <div class="work-type-buttons">
        <button class="work-type-btn btn-primary active" id="todayWorkBtn">📅 Record Today's Work</button>
        <button class="work-type-btn btn-info" id="planWorkBtn">📋 Plan Work</button>
    </div>
</div>

<!-- Quick Actions -->
<div class="card" id="quickActions">
    <h3>⚡ Quick Actions</h3>
    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <button class="btn" id="selectProjectBtn" style="background: #6c757d; color: white;">📋 Select Project</button>
        <button class="btn" id="templateBtn" style="background: #17a2b8; color: white;">📁 Project Template</button>
        <button class="btn" id="clearFormBtn" style="background: #dc3545; color: white;">🗑️ Clear Form</button>
    </div>
</div>

<!-- Work Record Form -->
<div class="card" id="workForm">
    <h3 id="formTitle">Record Today's Work</h3>
    
    <!-- Plan Date Picker (Only shown for Plan Work) -->
    <div class="form-group" id="datePickerGroup" style="display: none;">
        <label for="workDate">Plan Date</label>
        <input type="date" id="workDate" class="form-control">
    </div>
    
    <div class="form-group">
        <label for="project">Project Name *</label>
        <input type="text" id="project" class="form-control" placeholder="e.g：User Management System Refactoring">
    </div>
    
    <div class="form-group">
        <label for="technology">Technology Stack</label>
        <input type="text" id="technology" class="form-control" placeholder="e.g：React + Node.js + MySQL">
    </div>
    
    <div class="form-group">
        <label for="workContent" id="workContentLabel">Work Content *</label>
        <textarea id="workContent" class="form-control" rows="3" placeholder="e.g：Refactored the user authentication module..."></textarea>
    </div>
    
    <div class="form-group">
        <label for="difficulty" id="difficultyLabel">Difficulty</label>
        <textarea id="difficulty" class="form-control" rows="2" placeholder="e.g：Encountered challenges with user authentication..."></textarea>
    </div>
    
    <div class="form-group">
        <label for="projectProgress">Project Progress (0-100%)</label>
        <div style="display: flex; align-items: center; gap: 10px;">
            <input type="range" id="progressSlider" min="0" max="100" value="0" style="flex: 1;">
            <span id="progressValue">0%</span>
            <input type="number" id="projectProgress" min="0" max="100" value="0" style="width: 80px;">
        </div>
    </div>
    
    <div class="form-group">
        <label for="tags">Tags (comma-separated)</label>
        <input type="text" id="tags" class="form-control" placeholder="e.g：Frontend Development, Performance Optimization, Team Collaboration">
    </div>
    
    <div style="display: flex; gap: 10px;">
        <button class="btn btn-primary" id="saveWorkBtn">💾 Save Work</button>
    </div>
</div>

<!-- Plan Management Area (Only shown for Plan Work) -->
<div class="card" id="planManagement" style="display: none;">
    <h3>📋 Plan Management</h3>
    
    <!-- Plan Filter -->
    <div style="margin-bottom: 15px;">
        <button class="btn btn-info active" id="showPendingPlans">⏳ Pending Plans</button>
        <button class="btn btn-success" id="showCompletedPlans">✅ Completed Plans</button>
        <button class="btn" id="showAllPlans" style="background: #6c757d; color: white;">📋 All Plans</button>
    </div>
    
    <!-- Plan List -->
    <div id="planList">
        <div style="text-align: center; padding: 20px; color: #6c757d;">
            No pending work plans available.
        </div>
    </div>
</div>
